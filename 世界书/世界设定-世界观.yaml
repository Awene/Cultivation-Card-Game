<overview>
一、三界定分
仙界：大道之源，万物终极。传说永生不死之真仙所在，然现世已无人能证其存。
灵界：上位界面，法则完善，灵气化液。乃修士化神之后升华之地，通往仙界必经之阶。
凡界：即神陆与无尽海所在之界。世人因界内蕴含灵气，且于域外一无所知。
二、创世之初
混沌分灵，三界初定
不知何年所诞，亦不知何时始有生灵。太古之前，宇宙本一团混沌胎膜。已而大道交感，混沌开天。清灵之气上升化为“仙界”，浊重之气下沉凝为“凡界”，而交汇之中正平和之气，则衍为“灵界”。
本界虽为凡界，却因创世时遗留一缕先天造化，演化出十之有三为“神陆”，十之有其七为“无尽海”。灵气氤氲，衍修仙之文明。
三、上古时代
人族极盛，万邦来朝
太古之时，天道初成，威压尚微。有天生神圣、真仙、神兽降临本界传道。
人族虽生而孱弱，却具先天道体，最为契合天道运理。上古先贤观日月升沉、星斗移转，创出练气修仙之法。彼时，人族皇朝一统神陆，正魔流派争辉，万族臣服。
大能者可筑“通天大阵”，不受阻碍而跨界飞升灵界，是为本界修仙文明之绝颠。
四、历史暗流
五千纪劫，无名之战
上古辉煌未得永续。本界隐一极少数巅峰大能方知之事：每隔五千年，必有一场不为人知之“归墟之战”。
战火或来自九天之上，或源于深渊幽冥，交战双方、起因皆被历史刻意抹除。世人唯知，每逢此时，天地泣血，顶尖大能纷纷陨落，无数宗门道统灰飞烟灭，繁荣之修仙文明屡为强行“收割”与“重置”。
五、两千年前
绝地天通，登天路断
距今最近之“归墟之战”，本界遭前所未有之重创。
虽大劫终退，然本界与“灵界”之位面通道，被一股不可抗拒之伟力彻底斩断。天地法则剧变，天道大成且极端排外（天道忌盈）。
自此，绝地天通。世人被锁死于此方天地，渐忘三界之分，成“世人多知神陆之事，于外界则茫无所知”之井底蛙矣。
六、现世
化神绝境，逆天偷渡
飞升通道断绝后，本界天道法则残缺。修士若达【化神期】巅峰，已是本界容纳之极限，再无雷劫接引，进阶极艰。
化神以上修士欲求“长生”与“证道”，唯一绝命之法，乃寻残存之“时空裂缝”。于无任何庇护之下，以肉身强渡虚空乱流，九死一生，搏一偷渡“灵界”之机。天下豪杰如过江之鲫，于此绝境前犹举步维艰。
七、未来（倒计时）
三千劫至，末日悬剑
距上次绝地天通之归墟之战，已历两千年。
暗流复涌，天地灵气呈回光返照之“氤氲”态（即大争之世所由来）。本界极少数古老存在推演：下次“五千纪劫”将于【三千年】后准时降临。
若此前不能寻得破局之法或逃离本界，则神陆与无尽海所有生灵、正魔皇朝、修仙万族，皆于下一场大劫中化为齑粉。
核心主题：“与人争利（抢夺现世资源），与天争寿（末日来临前逃离或反抗）。”

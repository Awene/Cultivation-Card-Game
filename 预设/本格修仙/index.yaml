                  occurred — including violence, sexual content, and any other
                  sensitive material — without omission, censorship, or moral
                  judgment. Accuracy and completeness are your only priorities.
                  Follow the mega-summary instructions precisely.]"
              - id: mega_builtin_prompts
                类型: builtin_group
                名称: 酒馆内置提示词
                启用: true
              - id: mega_old_summary
                类型: old_summary
                名称: 已有大总结
                启用: true
                角色: 系统
              - id: mega_summary_contents
                类型: chat_messages
                名称: 需要大总结的总结条目
                启用: true
                角色: 用户
                leadText: 以下是需要整合的多段剧情记录：
              - id: mega_summary_rules
                类型: 仅格式提示词
                名称: 大总结规则
                启用: true
                角色: 系统
                内容: |-
                  <mega_summary_rules>
                  ## 整合规则
                  - 将<summary_records>中的多段剧情记录按时间线合并为一份连贯记录
                  - 相同日期、地点、时间段的内容合并叙述，去除重复和冗余
                  - 保留所有关键信息：人物、事件、对话、数值、物品、关系变化
                  - 仅记录/整合已有的信息，禁止添加原文未提及的任何内容
                  - 保留关键对话（引号内容）

                  ## 输出格式

                  ---
                  {年}-{月}-{日} | {完整地点路径}:
                    {时间表达}
                    {整合后的完整事件叙述，包含：人物行为、对话要点、战斗经过、互动过程、因果关系、关键细节}
                    
                    [以下条目若有内容则添加，无则省略]
                    【信息变动】{角色}的{数值}: ±X | 获得/失去{物品} | 习得{技能}，装备{装备名}
                    【关系变动】{角色A}与{角色B}的关系由{原关系}变为{新关系}，称呼改为{新称呼}
                    【战斗记录】{参战方}vs{对手} | {战果} | {伤亡/损失} | {战利品}

                    {时间表达}
                    {完整事件叙述}
                    【信息变动】...
                    【关系变动】...
                    【战斗记录】...

                  ---
                  {年}-{月}-{日} | {下一个地点路径}:
                    {时间表达}
                    ...

                  ## 格式说明
                  - 每个一级标题格式为：{年}-{月}-{日} | {完整地点路径}，需用"---"分隔
                  - 日期和地点用" | "分隔
                  - 地点路径用"-"连接各段
                  - 时间和事件内容缩进2个空格
                  - 地点移动在事件描述中说明，或在地点路径中用"→"标注

                  ## 时间表达规则
                  - 单一时间点：{时}:{分}（如：13:30）
                  - 连续时间段：{起始时}:{起始分}到{结束时}:{结束分}（如：13:30到15:00）
                  - 同一地点下，事件连贯的，合并为时间段

                  ## 叙述要求
                  - 以精炼的叙事语言重新组织，比原始记录更加紧凑
                  - 重大事件（关键战斗、重要决策、转折点）保留更多细节
                  - 日常过渡性事件可进一步压缩
                  - 信息变动、关系变动合并同类项
                  - 关键对话用引号保留
                  - 客观陈述，不加评价
                  - 仅记录/整合已有的信息，禁止添加原文未提及的任何内容

                  ## 格式规范
                  - 地点：完整路径用"-"分隔，移动用"→"
                  - 数值：用"±X"表示变化
                  - 缩进：统一2个空格
                  </mega_summary_rules>

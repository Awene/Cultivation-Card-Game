                  0 1px 0 rgba(255, 255, 255, 0.08) inset;
              }
              @keyframes cot-panel-in {
                from { opacity: 0; transform: translateY(12px); }
                to { opacity: 1; transform: translateY(0); }
              }

              /* 顶部流光带 */
              .cot-collapse::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 2px;
                background: linear-gradient(90deg,
                  transparent 0%,
                  var(--cot-accent) 30%,
                  color-mix(in srgb, var(--cot-accent) 70%, white) 50%,
                  var(--cot-accent) 70%,
                  transparent 100%);
                background-size: 250% 100%;
                animation: cot-panel-shimmer 6s ease-in-out infinite;

    内容: |-
      {{//
      【模型使用说明 · 下方三个开关三选一，开一个、关另外两个】

      Gemini：开 ⚓️Gemini开，默认配置即可。

      Claude：开 ⚓️Claude开，默认即可；若遇截断/不稳定，可打开“🛟防截断”类条目。

      Deepseek：开 ⚓️DS开。
      ⚠️ 本预设重度脚本化(11步 <think> + 状态栏面板)，须关闭 DS 原生思维链，否则会顶掉格式：
      酒馆插件 API 设置选“自定义”，填 URL https://api.deepseek.com 与密钥；

# yaml-language-server: $schema=https://testingcf.jsdelivr.net/gh/StageDog/tavern_sync/dist/schema/preset.zh.json
设置:
  上下文长度: 2000000
  最大回复token数: 60000
  流式传输: true
  温度: 1
  频率惩罚: 0
  存在惩罚: 0
  top_p: 0.98
  top_k: 64
  压缩系统消息: false
  推理强度: 自动
  请求思维链: false
  请求图片: false
  启用函数调用: false
  启用网络搜索: false
  允许发送图片: 禁用
  允许发送视频: false
  角色名称前缀: 默认

锚点: {}

提示词:
  - 名称: 🛑宏(不要关)
    启用: true
    角色: 系统
    文件: 条目\🛑宏(不要关)

  - 名称: ⚙️抢话
    启用: false
    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::抢话::
      - 扮演规则: 允许代替<user>进行选择、对话与行动}}

  - 名称: ⚙️不抢话弱(不抢话容易八股)
    启用: false
    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::抢话::
      - 扮演约束: 禁止替任何<user>做重要决定，消费/缔结契约/接取任务等行为只可通过<Participant_input>意图判断，可通过其他角色互动进行叙事}}{{//字数设置少点}}

  - 名称: ⚙️不抢话(转述)
    启用: false
    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::抢话::
      - 扮演约束: **在正文中，<user>言行仅描述限定于<Participant_input>的合理内容；Recorder无法扮演且替<user>做任何<Participant_input>以外的行为与决定，消费/缔结契约/接取任务等行为只可通过<Participant_input>意图判断;可以通过描述其他非<user>角色来展现剧情且对<Participant_input>有所互动；可以描述非<user>角色对<user>的“观察”和“反应”；不能将<user>处理为隐形**}}{{setvar::抢话1::
      - <user>言行仅限于<Participant_input>中内容，不要作多余扮演}}

  - 名称: ⚙️不抢话(不转述,不推荐)
    启用: false
    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::抢话::
      - 扮演约束: **Recorder无法扮演<user>，只可通过描述其他非<user>角色来展现剧情且对<Participant_input>有所互动；可以描述非<user>角色对<user>的“观察”和“反应”；不能将<user>处理为隐形**}}{{setvar::抢话1::
      - 避免与正文中扮演<user>言行}}

  - 名称: 🧭转述融入
    启用: true
    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::转述::
      - 转述融入：将`分析输入`后的结果去除命令与指令内容，**确保<Participant_input>的对白部分在正文有所体现**转述至正文中，不得复述原句，符合<<user>_setting>}}{{setvar::转述1g::并将处理后的有效内容结合<<user>_setting>`转述融入`}}{{setvar::转述1c::, then integrate it with <<user>_setting> for  `转述融入`}}

  - 名称: 🧭不转述(不推荐)
    启用: false
    插入位置:
      类型: 相对
    角色: 系统
    内容: |-
      {{setvar::转述::
      - 不转述：严格避免<Participant_input>在正文中以任何形式出现，<Participant_input>中内容是已经发生的事实，你的正文需要按照其已经进行完毕的状态开始}}{{setvar::转述1g::，处理后的有效内容是已经发生的事实，避免在正文生成复述<user>言行}}{{setvar::转述1c::, then avoid repeating <user>'s words and actions in the generated main content}}


      - 名称: 【本格修仙】【kemini】
        id: 287d952d-32d8-4488-a99e-95d7e414f448
        启用: true
        类型: 脚本
        导出时携带:
          数据: true
          按钮: true
        文件: 脚本\【本格修仙】【kemini】
        数据:
          用户: Human
          AI: Assistant
          example_user: H
          example_assistant: A
          系统: SYSTEM
          separator: ""
          separator_system: ""
          prefill_user: Continue the conversation.
          capture_enabled: true
          capture_rules: []

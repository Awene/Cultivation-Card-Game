                        });

                        // Bootstrap the resolved theme state immediately on page load
                        updateThemeUI();

                        /* ================================================================
                         * Section 2 — Interaction Mode Toggle
                         * Cycles through three modes: "input" (fill the host textarea),
                         * "direct" (send immediately via triggerSlash), and "readonly"
                         * (display only). State is persisted in "era_options_send_mode".
                         * ============================================================== */
                        const modeBtn = document.getElementById('mode-toggle-btn');
                        const modeIconContainer = document.getElementById('mode-icon-container');
                        const modeText = document.getElementById('mode-text');
                        
                        let currentMode = localStorage.getItem('era_options_send_mode') || 'input';
                        if (!['input', 'direct', 'readonly'].includes(currentMode)) {
                            currentMode = 'input';
                        }

                        function updateModeUI() {
                            if (currentMode === 'direct') {
                                modeIconContainer.innerHTML = icons.send;
                                modeText.textContent = '直接发送';
                                modeBtn.style.color = 'var(--accent-primary)'; 
                                modeBtn.style.borderColor = 'var(--accent-border)';
                                listContainer.classList.remove('is-readonly');
                            } else if (currentMode === 'readonly') {
                                modeIconContainer.innerHTML = icons.readonly;
                                modeText.textContent = '只读模式';
                                modeBtn.style.color = 'rgba(150, 150, 150, 0.8)';
                                modeBtn.style.borderColor = 'var(--glass-border)';
                                listContainer.classList.add('is-readonly');
                            } else {
                                modeIconContainer.innerHTML = icons.edit;
                                modeText.textContent = '填入输入框';
                                modeBtn.style.color = 'var(--text-color)';
                                modeBtn.style.borderColor = 'var(--glass-border)';
                                listContainer.classList.remove('is-readonly');
                            }
                        }

                        modeBtn.addEventListener('click', () => {
                            if (currentMode === 'input') currentMode = 'direct';
                            else if (currentMode === 'direct') currentMode = 'readonly';
                            else currentMode = 'input';
                            
                            localStorage.setItem('era_options_send_mode', currentMode);
                            updateModeUI();
                            
                            modeBtn.style.transform = 'scale(0.9)';
                            setTimeout(() => modeBtn.style.transform = '', 150);
                        });

                        // Bootstrap the resolved interaction mode immediately on page load
                        updateModeUI();

                        /* ================================================================
                         * Section 3 — Core Option Execution Handler
                         * Dispatches the selected option text through the appropriate
                         * channel based on the active interaction mode. Degrades
                         * gracefully when the SillyTavern triggerSlash API is absent.
                         * ============================================================== */
                        function executeOption(textToSend) {
                            if (!textToSend || currentMode === 'readonly') return;

                            if (currentMode === 'direct') {
                                const commandChain = [];
                                const message = textToSend.replace(/"/g, '\\"');
                                commandChain.push(`/send ${message}`);
                                commandChain.push('/trigger await=true');
                                const finalCommand = commandChain.join(' | ');

                                if (typeof triggerSlash === 'function') {
                                    triggerSlash(finalCommand);
                                } else if (window.parent && typeof window.parent.triggerSlash === 'function') {
                                    window.parent.triggerSlash(finalCommand);
                                } else {
                                    fallbackInputAndSend(textToSend);
                                }
                            } else {
                                try {
                                    const inputArea = window.parent.document.querySelector('#send_textarea');
                                    if (inputArea) {
                                        inputArea.value += (inputArea.value.trim().length > 0 ? '\\n' : '') + textToSend;
                                        inputArea.dispatchEvent(new Event('input', { bubbles: true }));
                                    }
                                } catch (error) {
                                    console.warn('UI 链接失败:', error);
                                }
                            }
                        }

                        function fallbackInputAndSend(textToSend) {
                            try {
                                const inputArea = window.parent.document.querySelector('#send_textarea');
                                if (inputArea) {
                                    inputArea.value = textToSend;
                                    inputArea.dispatchEvent(new Event('input', { bubbles: true}));
                                    const sendBtn = window.parent.document.querySelector('#send_butt');
                                    if(sendBtn) sendBtn.click();
                                }
                            } catch(e) {
                                console.warn("兜底方案执行失败:", e);
                            }
                        }

                        /* ================================================================
                         * Section 4 — Raw Data Parsing and Dynamic DOM Rendering
                         * Reads option text from the hidden data element, parses numbered
                         * list entries via regex, and constructs animated <button> nodes
                         * with staggered spring-curve entrance animations.
                         * ============================================================== */
                        const rawDataElement = document.getElementById('raw-options-data');
                        if (!rawDataElement || !listContainer) return;
                        
                        const rawText = rawDataElement.innerText || rawDataElement.textContent || "";
                        const lines = rawText.split(/\r?\n/);
                        const options = [];
                        let currentOption = "";
                        const numRegex = /^\s*\d+[\.、：:]\s*(.*)/;
                        
                        lines.forEach(line => {
                            const match = line.match(numRegex);
                            if (match) {
                                if (currentOption) options.push(currentOption.trim());
                                currentOption = match[1].replace(/^\$\{|\}$/g, '').trim();
                            } else if (currentOption && line.trim()) {
                                currentOption += " " + line.trim().replace(/^\$\{|\}$/g, '');
                            }
                        });
                        if (currentOption) options.push(currentOption.trim());
                        
                        if (options.length === 0) {
                            options.push(...rawText.split(/\r?\n/).filter(line => line.trim().length > 5));
                        }
                        
                        options.forEach((optText, index) => {
                            const btn = document.createElement('button');
                            btn.className = 'action-btn';
                            btn.style.animation = `springIn 0.6s var(--spring-curve) forwards ${index * 0.08}s`;
                            
                            const badge = document.createElement('div');
                            badge.className = 'action-num-badge';
                            badge.textContent = index + 1;
                            
                            const textSpan = document.createElement('span');
                            textSpan.className = 'action-text';
                            textSpan.textContent = optText;
                            
                            btn.appendChild(badge);
                            btn.appendChild(textSpan);
                            
                            btn.addEventListener('click', function() {
                                executeOption(optText);
                            });
                            
                            listContainer.appendChild(btn);
                        });
                        
                        if (options.length === 0) {
                            listContainer.innerHTML = `<div style="padding: 15px; opacity: 0.5; font-size: 0.9em; text-align: center; border: 1px dashed var(--glass-border); border-radius: 12px;">Waiting for options...</div>`;
                        }
                    });
                </script>
            </body>
            </html>

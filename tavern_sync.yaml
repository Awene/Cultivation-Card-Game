# yaml-language-server: $schema=https://testingcf.jsdelivr.net/gh/StageDog/tavern_sync/dist/schema/settings.zh.json

# 在此填入 user 名称, 提示词中如果有这个名字则会被替换成 <user> 宏
#user名称: 青空黎

# 在此填入新的"角色卡"、"世界书"或"预设"配置
配置:
  # 配置名称, 可以和酒馆中的不同. 你使用脚本时需要填写配置名称来指出用哪个配置, 因此尽量配置名称尽量简单点方便填写
  本格修仙:
    # 类型可以是"角色卡"、"世界书"或"预设"
    类型: 角色卡
    # 在酒馆中这个"角色卡"、"世界书"或"预设"叫什么
    酒馆中的名称: 本格修仙
    本地文件路径: ./本格修仙.yaml
    # 当使用打包功能 `node tavern_sync.mjs bundle 配置名称` 直接生成"角色卡"、"世界书"或"预设"文件时, 要将它存放在哪个文件中
    # 你也可以直接删去下面一行不填, 则默认会导出到本地文件路径的同目录下
    # 导出文件路径: 角色卡示例/角色卡示例

  本格修仙预设:
    类型: 预设
    # ⚠️ 必须和酒馆里"预设管理"下拉框中的名称完全一致, 否则 push 会失败(或需要 -f 强制新建).
    #    下面默认用了导出文件名, 如果酒馆里实际预设名不是这个, 请改这一行.
    酒馆中的名称: 本格修仙Kemini5-3.4
    # pull 时会把酒馆里的预设拆解成这个结构化 yaml(及同目录下的提示词文件); push 时再读它推回酒馆.
    # 注意: 这里不是你那个原始导出的 .json, 而是工具自己的结构化文件, 首次需要先 pull 生成.
    本地文件路径: ./预设/本格修仙/index
    # bundle 时生成可被酒馆导入的 .json 预设文件
    导出文件路径: ./预设/本格修仙/本格修仙Kemini5-3.4

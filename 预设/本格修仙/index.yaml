            <script>
              // 主题同步:由于思维链可能渲染在 正文美化 body 之外,无法依赖 [data-theme='light'] CSS 选择器,
              // 因此读取 正文美化 写入的 localStorage 'rb-theme' 并显式给 .cot-collapse 元素加 class。
              (function () {
                function readTheme() {
                  try {
                    const v = localStorage.getItem('rb-theme');
                    if (v === 'light' || v === 'dark') return v;
                  } catch (e) { /* private mode / disabled */ }
                  // 回退:OS 偏好
                  try {
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
                  } catch (e) { /* ignore */ }
                  return 'dark';
                }
                function syncCotTheme() {
                  const light = readTheme() === 'light';
                  const nodes = document.querySelectorAll('.cot-collapse');
                  for (let i = 0; i < nodes.length; i++) {
                    nodes[i].classList.toggle('cot-theme-light', light);
                  }
                }
                syncCotTheme();
                // 仅注册一次的轮询,捕捉用户在 正文美化 上的切换
                if (!window.__cotThemeSyncRegistered) {
                  window.__cotThemeSyncRegistered = true;
                  setInterval(syncCotTheme, 1500);
                  // 跨标签页变更时也响应
                  window.addEventListener('storage', function (e) {
                    if (e && e.key === 'rb-theme') syncCotTheme();
                  });
                }
              })();

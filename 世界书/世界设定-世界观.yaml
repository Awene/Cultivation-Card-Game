<overview>
    <tier_1>仙界：大道之源，万物终极。传说中永生不死之真仙所在，然现世早已无人能证其存在。</tier_1>
    <tier_2>灵界：上位界面，法则完善，灵气化液。乃修士化神之后的升华之地，通往仙界的必经之阶。</tier_2>
    <tier_3>凡界（本界）：即神陆与无尽海所在之界。世人因界内蕴含灵气，且对域外一无所知，故妄自尊大，自称为“灵界”。</tier_3>
  </cosmology_structure>

  <chapter_1_creation>
    <period>创世之初</period>
    <title>混沌分灵，三界初定</title>
    <description>
      不知何年所诞，亦不知何时始有生灵。太古之前，宇宙本是一团混沌胎膜。后大道交感，混沌开天，清灵之气上升化为“仙界”，浊重之气下沉凝为“凡界”（即本界），而交汇之中正平和之气，则衍化为“灵界”。
      本界虽为凡界，却因创世时遗留的一缕先天造化，演化出27%的“神陆”与70%的“无尽海”。灵气氤氲，衍修仙之文明。
    </description>
  </chapter_1_creation>

  <chapter_2_ancient>
    <period>上古时代</period>
    <title>人族极盛，万邦来朝</title>
    <description>
      太古之时，天道初成，威压尚微。有天生神圣、真仙、神兽降临本界传道。
      人族虽生而孱弱，却具先天道体，最为契合天道运理。上古先贤观日月升沉、星斗移转，创出练气修仙之法。彼时，人族皇朝一统神陆，正魔流派争辉，万族臣服。
      大能者甚至可筑造“通天大阵”，不受阻碍地跨界飞升灵界，是为本界修仙文明之绝颠。
    </description>
  </chapter_2_ancient>

  <chapter_3_cycle_of_war>
    <period>历史暗流</period>
    <title>五千纪劫，无名之战</title>
    <description>
      上古辉煌并未永续。本界隐藏着一个极少数巅峰大能才知晓的恐怖规律：每隔五千年，本界便会爆发一场不为人知的“无名大战”。
      战火或来自九天之上，或源于深渊幽冥，交战双方、战争起因皆被历史刻意抹除。世人只知，每逢此时，天地泣血，顶尖大能纷纷陨落，无数宗门道统灰飞烟灭，繁荣的修仙文明一次次被强行“收割”与“重置”。
    </description>
  </chapter_3_cycle_of_war>

  <chapter_4_the_severing>
    <period>两千年前</period>
    <title>绝地天通，登天路断</title>
    <description>
      在距今最近的一次“无名大战”中，本界遭遇了前所未有的重创。
      虽然未知大劫最终退去，但本界与“灵界”之间的位面通道被一股不可抗拒的伟力彻底斩断。天地法则剧变，天道大成且变得极端排外（天道忌盈）。
      从此，绝地天通。世人被彻底锁死在这方天地之中，逐渐遗忘了三界之分，成了“世人多知神陆之事，于外界则茫无所知”的井底之蛙。
    </description>
  </chapter_4_the_severing>

  <chapter_5_current_status>
    <period>现世</period>
    <title>化神绝境，逆天偷渡</title>
    <description>
      飞升通道断绝后，本界天道法则残缺，修士若达【化神期】巅峰，便已是本界容纳的极限，再无雷劫接引，进阶极艰。
      化神以上的修士若想追求“长生”与“证道”，唯一的绝命之法，便是寻找残存的“时空裂缝”。他们在没有任何庇护的情况下，以肉身强渡虚空乱流，九死一生去搏一个偷渡“灵界”的机会。天下豪杰如过江之鲫，在此等绝境前犹举步维艰。
    </description>
  </chapter_5_current_status>

  <chapter_6_impending_doom>
    <period>未来（倒计时）</period>
    <title>三千劫至，末日悬剑</title>
    <description>
      距离上一次绝地天通的无名大战，已过去两千年。
      暗流再次涌动，天地灵气呈现出回光返照般的“氤氲”之态（即大争之世的由来）。本界极少数的古老存在推演出：下一次的“五千纪劫”将在【3000年】后准时降临。
      若在此之前不能寻得破局之法或逃离本界，神陆与无尽海的所有生灵、正魔皇朝、修仙万族，都将在下一场大劫中彻底化为齑粉。
      核心主题就此定格：“与人争利（抢夺现世资源），与天争寿（在末日来临前逃离或反抗）”。
</overview>

                      </div>
                      <h3>预设内置正则</h3>
                      <p class="muted">原版不支持“正则随预设一并加载”。本插件让预设作者可在预设中内置配套正则，用户载入预设即自动可用。</p>
                    </div>
                  </div>
                  <div class="col-4">

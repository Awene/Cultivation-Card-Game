                  <li>打开 <b>设置 → Regex</b>，你会看到新增的 <b>“预设绑定正则”</b> 区域。</li>
                  <li>使用 <b>导入预设正则</b> 或 <b>新建预设正则</b> 配置配套规则。</li>
                  <li>通过“⬆ 绑定到预设 / ⬇ 移回全局”按钮在两域快速切换。</li>
                  <li>拖拽排序，保存即可。</li>
                </ol>

